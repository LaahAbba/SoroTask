services:
  keeper:
    build:
      context: ./keeper
      dockerfile: Dockerfile
    container_name: sorotask-keeper
    restart: unless-stopped
    env_file:
      - path: ./keeper/.env
        required: false
    volumes:
      # Persist task registry data
      - ./keeper/data:/app/data
    ports:
      # Expose metrics and health check endpoint
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
